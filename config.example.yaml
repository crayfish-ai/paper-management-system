# Paper Management System Configuration
# Copy this file to config.yaml and modify as needed

# Database settings
database:
  path: "/data/disk/papers/index.db"

# Papers directory
papers:
  dir: "/data/disk/papers"
  extensions:
    - ".pdf"

# Downloads directory (for auto_index.sh)
downloads:
  dir: "/root/Downloads"
  keywords:
    - "科研通"
    - "ablesci"

# Logging
logging:
  path: "/data/disk/papers/auto_index.log"
  level: "INFO"

# AI Summarization
ai:
  enabled: false
  provider: "openai"  # openai, anthropic, etc.
  model: "gpt-3.5-turbo"
  api_key: ""  # Set via environment variable
  max_text_length: 50000

# Notification (optional)
notification:
  enabled: false
  cmd: "/usr/local/bin/notify"  # Path to notify command, or "stdout" for console output
  # Use feishu-relay v3.0+ for Feishu notifications
